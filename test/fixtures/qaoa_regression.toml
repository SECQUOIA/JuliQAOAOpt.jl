[fixture]
description = "Two-variable QUBO used for focused JuliQAOAOpt regression tests."
regenerate = "julia --project=. test/fixtures/regenerate_qaoa_regression_fixture.jl"

[qubo]
variables = 2
objective = "-x1 + 2*x2 + 2*x1*x2"
states = [[0, 0], [1, 0], [0, 1], [1, 1]]
energies = [0.0, -1.0, 2.0, 3.0]

[normalization.zscore]
shift = 1.0
scale = 1.8257418583505538
normalized_energies = [-0.5477225575051661, -1.0954451150103321, 0.5477225575051661, 1.0954451150103321]

[normalization.none]
shift = 0.0
scale = 1.0
normalized_energies = [0.0, -1.0, 2.0, 3.0]

[parameters]
layers = 2
normalized_angles = [0.11, 0.22, 0.33, 0.44]
zscore_qiskit_initial_parameters = [0.11, 0.22, 0.1807484439767048, 0.24099792530227307]
none_qiskit_initial_parameters = [0.11, 0.22, 0.33, 0.44]

[sampling]
# Draws intentionally avoid CDF boundaries (0.05, 0.20, 0.50) so searchsorted bins stay stable.
draws = [0.01, 0.04, 0.06, 0.1, 0.15, 0.19, 0.21, 0.25, 0.3, 0.4, 0.45, 0.49, 0.51, 0.6, 0.7, 0.8, 0.9, 0.95, 0.99, 0.999]
probabilities = [0.05, 0.15, 0.3, 0.5]

[[sampling.samples]]
state = [0, 0]
energy = 0.0
reads = 2

[[sampling.samples]]
state = [1, 0]
energy = -1.0
reads = 4

[[sampling.samples]]
state = [0, 1]
energy = 2.0
reads = 6

[[sampling.samples]]
state = [1, 1]
energy = 3.0
reads = 8
